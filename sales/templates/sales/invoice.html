<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POS Cashier Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        /* ညီမရဲ့ မူရင်း Dashboard အတွက် CSS များ (ဒီမှာထားပါ) */
        
    </style>
</head>
<body>

    <div class="container mt-5">
        <h1>POS Dashboard</h1>
        <button onclick="printInvoice()" class="btn btn-success">PRINT INVOICE</button>
    </div>

    <div id="invoice-template" style="display:none;">
        <div style="font-family: 'Courier New', monospace; width: 300px; padding: 10px; border: 1px solid #000; margin: auto;">
            <div style="text-align: center; font-weight: bold; font-size: 16px;">CITY MART POS</div>
            <div style="font-size: 12px; text-align: center;">Yangon, Myanmar</div>
            
            <div style="font-size: 12px; margin-top: 10px;">
                <div>Cashier: su myat noe</div>
                <div>Date: 2026-06-15 22:19</div>
            </div>
            
            <div style="margin-top: 10px; border-top: 1px dashed #000; border-bottom: 1px dashed #000; padding: 10px 0; font-size: 12px;">
                <div style="display: flex; justify-content: space-between;">
                    <span>Coca Cola (x1)</span>
                    <span>1,800</span>
                </div>
            </div>
            
            <div style="text-align: right; font-weight: bold; margin-top: 10px; font-size: 12px;">
                <div>Subtotal: 1,800</div>
                <div>Tax (5%): 90</div>
                <div style="font-size: 14px;">TOTAL: 1,890</div>
            </div>
            
            <div style="text-align: center; margin-top: 15px; font-size: 10px;">Thank You! Please Come Again.</div>
        </div>
    </div>

    <script>
        function printInvoice() {
            // ၁။ Invoice template ကို ကူးယူပါ
            var content = document.getElementById('invoice-template').innerHTML;
            
            // ၂။ ပြတင်းပေါက်အသစ်တစ်ခု ခဏဖွင့်ပါ
            var printWin = window.open('', '_blank', 'width=400,height=600');
            
            // ၃။ ပရင့်ထုတ်မည့် စာမျက်နှာကို တည်ဆောက်ပါ
            printWin.document.write('<html><head><title>Invoice</title></head><body>');
            printWin.document.write(content);
            printWin.document.write('</body></html>');
            
            // ၄။ ပရင့်ထုတ်ပြီး ပြတင်းပေါက်ပိတ်ပါ
            printWin.document.close();
            printWin.focus();
            printWin.print();
            printWin.close();
        }
    </script>

</body>
</html>
